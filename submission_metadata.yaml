ai_tools_used:
  - "Cursor"
  - "Claude"

ai_usage_summary: |
  We used Cursor IDE with Claude for code scaffolding and debugging
  during development. The core scoring weights, honeypot detection
  heuristics, and DNA Fingerprint design were developed by hand
  through iterative analysis of the candidate dataset. All ranking
  runs locally — zero candidate data leaves the machine.

# ============================================================================
# Approach summary (under 200 words)
# ============================================================================
methodology_summary: |
  A lightweight multi-dimensional scoring engine that ranks 100K
  candidates in under 15 seconds on CPU. The pipeline has four stages:
  (1) deterministic honeypot detection using 7 contradiction checks
  (date anomalies, impossible skill durations, YOE mismatches);
  (2) weighted scoring across role/title fit, technical skill depth,
  experience trajectory, and logistics/availability;
  (3) a behavioral modifier that adjusts scores based on platform
  engagement signals (recency, response rate, interview completion);
  (4) a novel Candidate DNA Fingerprint and Recruiter Trust Score
  that visualizes candidate strengths across 6 axes and quantifies
  profile verification confidence. Reasonings are generated from
  verified profile facts with rank-consistent tone. No LLM APIs
  are called during ranking.

